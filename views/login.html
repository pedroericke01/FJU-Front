<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="../icon/icon-nova/favicon.ico" type="image/x-icon">
    
    <!-- chamada as media queries: -->
    <link rel="stylesheet" href="../styles/login.css" media="all">
    <link rel="stylesheet" href="../styles/queries/login.css">
    
    <!-- chamada ao javascript -->
    <script type="module" src="../scripts/login.js" defer></script>

    <title>FJU Macaé</title>
</head>
<body>

    <header>

        <div class="logo">
            <a href="login.html">Login</a>
        </div>

    </header>
    
    <main>

        <div class="conteiner_dados">

            <form action="" method= "get" autocomplete="off">

                <div class="conteiner_imagem">
                    <img src="../images/logos/logo-atual.png" alt="logo_atual">
                </div>
            
                <input type="email" name="email" id="email" placeholder="Insira seu email" maxlength="124" required>
                <input type="password" name="senha" id="senha" placeholder="Insira sua senha" maxlength="10" required>
            
                <input type="submit" value="Entrar">
                <input type="reset" value="Limpar">

            </form>

        </div>

    </main>

    <footer>
        <p>A <strong>FJU</strong> é o lugar onde todos os jovens deveriam estar!</p>
    </footer>
 
</body>
</html>
